<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PUB_API | INTELIGENCIA</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Titillium+Web:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark fixed-top">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand" href="#">
                TERMINAL_PUB_API 
                <span id="mode-badge" class="badge bg-success">LIVE</span>
            </a>
            <button class="btn btn-download-main" id="downloadAllBtn">DESCARGAR REPORTE TOP 10</button>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Consola de estado para depuración -->
        <div id="status-console" class="alert d-none"></div>

        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-3 text-warning">SINCRONIZANDO CON SATÉLITE DE NOTICIAS...</p>
        </div>

        <div class="row g-4" id="newsGrid">
            <!-- Las tarjetas se cargarán aquí -->
        </div>
    </div>

    <footer class="py-4 text-center">
        <small class="text-muted">PUB_API ARCHIVE SYSTEM &copy; 2025</small>
    </footer>

    <script src="script.js"></script>
